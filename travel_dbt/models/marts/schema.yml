version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_route
    columns:
      - name: route_id
        tests:
          - not_null
          - unique

  - name: fact_bookings
    columns:
      - name: booking_id
        tests:
          - not_null
          - unique
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: route_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_route')
              field: route_id