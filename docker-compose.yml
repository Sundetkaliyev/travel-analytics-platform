services:
  postgres:
    image: postgres:16
    container_name: travel_analytics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_pwd
      POSTGRES_DB: travel
    ports:
      - "5433:5432"
    volumes:
      - travel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d travel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  travel_pgdata:
